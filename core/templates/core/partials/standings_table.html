<div class="table-wrap"><table class="table"><thead><tr><th>#</th><th>Player</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th></tr></thead><tbody>{% for row in standings %}<tr><td>{{ forloop.counter }}</td><td><a href="{{ row.player.get_absolute_url }}">{{ row.player.user.username }}</a></td><td>{{ row.played }}</td><td>{{ row.wins }}</td><td>{{ row.draws }}</td><td>{{ row.losses }}</td><td>{{ row.goals_for }}</td><td>{{ row.goals_against }}</td><td>{{ row.goal_diff }}</td><td><strong>{{ row.points }}</strong></td></tr>{% endfor %}</tbody></table></div>
